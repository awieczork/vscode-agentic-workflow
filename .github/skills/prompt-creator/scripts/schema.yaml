# Prompt Output Schema

artifact_type: prompt
version: "1.0"

frontmatter:
  required:
    - description: "describes prompt purpose"
  optional:
    - agent: "target agent mode (e.g., 'architect', 'build')"
    - variables: "array of variable definitions with name and description"

body:
  required_sections:
    - context: "background information for the task"
    - task: "what to accomplish (task before context in output)"
    - format: "expected response structure"
  optional_sections:
    - examples: "sample inputs/outputs"
    - constraints: "limitations or requirements"
  forbidden_patterns:
    - "[PLACEHOLDER]"
    - "TODO"
    - "TBD"

constraints:
  - "Task section MAY appear before context in rendered output (recommended for complex tasks)"
  - "Variables use ${input:varname} syntax"
  - "snake_case XML tag names"

size_limits:
  max_tokens: 500

filename_pattern: "{name}.prompt.md"

validation_rules:
  p1:
    - "File location is .github/prompts/"
    - "File extension is .prompt.md"
    - "Frontmatter YAML is valid"
    - "No placeholder text ([PLACEHOLDER], TODO, TBD)"
    - "No secrets or credentials"
  p2:
    - "description field present"
    - "description is 50-150 characters, single-line"
    - "description starts with imperative verb"
    - "Variables use ${name} syntax"
    - "XML tags for prompts with 2+ sections"
    - "No hardcoded workspace-specific paths"
  p3:
    - "Task section before context section"
    - "Examples provided for complex prompts"
    - "Variable descriptions in frontmatter"
