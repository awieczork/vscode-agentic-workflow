# Expected Schema Definitions for Patterns Shiny App
# Used by validate_schema.R to check Parquet files

version: "1.0.0"
last_updated: "2026-01-28"

tables:
  pattern_metadata:
    description: "Core pattern definitions with metadata and usage statistics"
    location: "data/patterns/pattern_metadata.parquet"
    columns:
      pattern_id:
        type: string
        required: true
        description: "Unique identifier for the pattern"
      pattern_name:
        type: string
        required: true
        description: "Human-readable pattern name"
      pattern_description:
        type: string
        required: false
        description: "Detailed description of the pattern"
      category:
        type: string
        required: true
        description: "Pattern category (e.g., behavioral, structural)"
      subcategory:
        type: string
        required: false
        description: "More specific categorization"
      usage_count:
        type: int64
        required: false
        description: "Number of times pattern has been used"
      confidence_score:
        type: double
        required: false
        description: "ML confidence score (0-1)"
      created_at:
        type: timestamp
        required: true
        description: "Pattern creation timestamp"
      updated_at:
        type: timestamp
        required: false
        description: "Last update timestamp"
      is_active:
        type: boolean
        required: true
        description: "Whether pattern is currently active"

  pattern_documents:
    description: "Many-to-many relationship between patterns and documents"
    location: "data/patterns/pattern_documents.parquet"
    columns:
      pattern_id:
        type: string
        required: true
        description: "Foreign key to pattern_metadata"
      document_id:
        type: string
        required: true
        description: "Foreign key to document_metadata"
      relevance_score:
        type: double
        required: false
        description: "How relevant the document is to the pattern (0-1)"
      extraction_date:
        type: date
        required: true
        description: "When the relationship was identified"
      extraction_method:
        type: string
        required: false
        description: "Algorithm used for extraction"

  document_metadata:
    description: "Document catalog with metadata (~200k documents)"
    location: "data/documents/document_metadata.parquet"
    columns:
      document_id:
        type: string
        required: true
        description: "Unique document identifier"
      document_title:
        type: string
        required: true
        description: "Document title"
      document_type:
        type: string
        required: true
        description: "Type (article, report, transcript, etc.)"
      source:
        type: string
        required: false
        description: "Origin source of the document"
      author:
        type: string
        required: false
        description: "Document author"
      publish_date:
        type: date
        required: false
        description: "Publication date"
      word_count:
        type: int64
        required: false
        description: "Total word count"
      language:
        type: string
        required: true
        description: "ISO language code"
      ingestion_date:
        type: timestamp
        required: true
        description: "When document was added to system"

  document_cooccurrence:
    description: "Document co-occurrence matrix for relationship analysis"
    location: "data/relationships/document_cooccurrence.parquet"
    columns:
      document_id_1:
        type: string
        required: true
        description: "First document in pair"
      document_id_2:
        type: string
        required: true
        description: "Second document in pair"
      cooccurrence_count:
        type: int64
        required: true
        description: "Number of times documents appear together"
      cooccurrence_score:
        type: double
        required: false
        description: "Normalized co-occurrence strength (0-1)"
      shared_patterns:
        type: int32
        required: false
        description: "Number of patterns shared by both documents"
      calculation_date:
        type: date
        required: true
        description: "When co-occurrence was calculated"

  sessions:
    description: "User session data partitioned by segment and industry (~800k records)"
    location: "data/sessions/"
    partitioned_by:
      - segment
      - industry
    columns:
      session_id:
        type: string
        required: true
        description: "Unique session identifier"
      user_id:
        type: string
        required: false
        description: "Anonymized user identifier"
      segment:
        type: string
        required: true
        description: "Customer segment (partition key)"
      industry:
        type: string
        required: true
        description: "Industry vertical (partition key)"
      session_start:
        type: timestamp
        required: true
        description: "Session start time"
      session_end:
        type: timestamp
        required: false
        description: "Session end time"
      duration_seconds:
        type: int64
        required: false
        description: "Session duration in seconds"
      patterns_viewed:
        type: int32
        required: false
        description: "Number of patterns viewed"
      documents_accessed:
        type: int32
        required: false
        description: "Number of documents accessed"
      search_queries:
        type: int32
        required: false
        description: "Number of search queries"
      device_type:
        type: string
        required: false
        description: "Device type (desktop, mobile, tablet)"
      referrer:
        type: string
        required: false
        description: "Traffic source"
